name: Build custom_jpegview

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    # 修正此步驟：改用乾淨、標準的 vswhere 指令獲取 Visual Studio 實際安裝路徑
    - name: Install ATL/MFC Components
      shell: powershell
      run: |
        $vsPath = & vswhere -latest -property installationPath
        if (-not $vsPath) { $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" }
        
        Write-Output "Found VS Path: $vsPath"
        
        # 移除了 --passive，改用正確的對應參數。使用 Start-Process 加上 -Wait 確保檔案完全灌完
        $process = Start-Process -FilePath "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
          -ArgumentList "modify --installPath `"$vsPath`" --add Microsoft.VisualStudio.Component.VC.ATLMFC --add Microsoft.VisualStudio.Component.VC.14.29.16.11.ATL --quiet --norestart" `
          -PassThru -Wait
        
        Write-Output "Installer exited with code: $($process.ExitCode)"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
  
    - name: Setup MSVC dev environment (WITH ATL)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Verify MSVC environment
      shell: cmd
      run: |
        echo %INCLUDE%
    
    - name: Build Release x64
      working-directory: src
      shell: cmd
      run: |
        msbuild JPEGView.sln ^
          /m ^
          /t:Rebuild ^
          /p:Configuration=Release ^
          /p:Platform=x64

    - name: Self-sign Binaries
      shell: powershell
      run: |
        # 1. 建立臨時憑證
        $cert = New-SelfSignedCertificate -Type CodeSigning -CertStoreLocation Cert:\CurrentUser\My -Subject "CN=GitHubActionBuild"
        
        # 2. 尋找 signtool.exe 的路徑
        $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recycle -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        
        # 3. 進行簽章
        & $signtool sign /a /s My /n "GitHubActionBuild" src/JPEGView/bin/x64/Release/JPEGView.exe
        & $signtool sign /a /s My /n "GitHubActionBuild" src/JPEGView/bin/x64/Release/WICLoader.dll

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: JPEGView-x64
        path: |
          src/JPEGView/bin/x64/Release/*.exe
          src/JPEGView/bin/x64/Release/*.dll
