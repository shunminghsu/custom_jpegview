name: Build custom_jpegview

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install ATL/MFC
      run: choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Component.VC.ATLMFC"
  
    - name: Setup MSVC dev environment (WITH ATL)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Verify MSVC environment
      shell: cmd
      run: |
        echo %INCLUDE%
    
    - name: Build Release x64
      working-directory: src
      shell: cmd
      run: |
        msbuild JPEGView.sln ^
          /m ^
          /p:Configuration=Release ^
          /p:Platform=x64

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: JPEGView-x64
        path: |
          src/JPEGView/bin/x64/Release/*.exe
          src/JPEGView/bin/x64/Release/*.dll
