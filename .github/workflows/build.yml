name: Build custom_jpegview

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    # 方案 1：使用 vswhere 自動尋找 VS 安裝路徑，並使用「舊版」相容的 MSVC 14.29 工具組（對應您日誌中的 vc142）
    - name: Install ATL/MFC Components
      shell: powershell
      run: |
        $vsPath = &(build-letter-case "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe") -latest -property installationPath
        if (-not $vsPath) { $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" }
        
        echo "Found VS Path: $vsPath"
        
        # 同時安裝最新版 ATL 與您專案正在使用的 v142 (VS2019) 舊版 ATL 工具組
        $process = Start-Process -FilePath "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
          -ArgumentList "modify --installPath `"$vsPath`" --add Microsoft.VisualStudio.Component.VC.ATLMFC --add Microsoft.VisualStudio.Component.VC.14.29.16.11.ATL --passive --norestart" `
          -PassThru -Wait
        
        # 檢查安裝跳出碼，確保不是因為錯誤而靜默結束
        echo "Installer exited with code: $($process.ExitCode)"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
  
    - name: Setup MSVC dev environment (WITH ATL)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Verify MSVC environment
      shell: cmd
      run: |
        echo %INCLUDE%
    
    - name: Build Release x64
      working-directory: src
      shell: cmd
      run: |
        msbuild JPEGView.sln ^
          /m ^
          /t:Rebuild ^
          /p:Configuration=Release ^
          /p:Platform=x64

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: JPEGView-x64
        path: |
          src/JPEGView/bin/x64/Release/*.exe
          src/JPEGView/bin/x64/Release/*.dll
